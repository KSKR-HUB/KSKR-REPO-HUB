// ================== HAMILTON ==================
function allocate(pop,total){
  let sum=Object.values(pop).reduce((a,b)=>a+b,0);
  let base={},rem=[];
  for(let s in pop){
    let q=(pop[s]/sum)*total;
    base[s]=Math.floor(q);
    rem.push({s,frac:q-base[s]});
  }
  let left=total-Object.values(base).reduce((a,b)=>a+b,0);
  rem.sort((a,b)=>b.frac-a.frac);
  for(let i=0;i<left;i++) base[rem[i].s]++;
  return base;
}
function buildUTModel(popBase){

  let ratio = getRatio(popBase, STATE_TOTAL); // ratio based on STATES
  return allocateUTSeats(POP_UT, ratio, UT_TOTAL); // exactly 35
}

// 2026 projection
function project2026(){
  let out={};
  for(let s in POP_2011){
    let g=1.18;
    if(s==="Uttar Pradesh"||s==="Bihar") g=1.25;
    if(s==="Tamil Nadu"||s==="Kerala") g=1.08;
    out[s]=Math.round(POP_2011[s]*g);
  }
  return out;
}

// 3️⃣ UT MODEL 

function allocateUTSeats(popUT, ratio, targetTotal){

  let base = {};
  let rem = [];
  let used = 0;

  // Step 1 — lock minimum seats = CURRENT (no loss rule)
  for(let s in popUT){
    base[s] = CURRENT[s] || 1; // fallback 1 if missing
    used += base[s];

    let q = popUT[s] / ratio;
    rem.push({s, frac: q});
  }

  let remaining = targetTotal - used;

  // 🔴 Safety: if baseline already exceeds 35 (rare but possible)
  if(remaining < 0){
    console.warn("Baseline UT seats exceed target 35");
    return base;
  }

  // Step 2 — distribute remaining proportionally
   rem.sort((a,b)=>b.frac - a.frac);

  let i = 0;

  while(remaining > 0){

    let idx = i % rem.length;

    base[rem[idx].s]++;

    remaining--;

    i++;
 }

  return base;
}
// ================== MERGE STATES + UT ==================
function mergeStatesWithUTs(stateModel, utModel){

  let out = {};

  for(let s in CURRENT){

    if(stateModel && stateModel[s] !== undefined){
      out[s] = stateModel[s];
    }
    else if(utModel && utModel[s] !== undefined){
      out[s] = utModel[s];
    }
    else{
      out[s] = CURRENT[s];
    }
  }

  return out;
}
// ✅ NOW CLOSES PROPERLY

function computeShareExcludingDJK(data){

  let total = 0;
  let south = 0;

  for(let s in data){

    if(EXCLUDE_SENSITIVITY.includes(s)) continue;

    if(!(s in POP_2011)) continue;

    total += data[s];

    if(SOUTH.includes(s)) south += data[s];
  }

  return {
    south: (south/total*100),
    north: (100 - (south/total*100))
  };
}
function getRatio(pop, totalSeats){

  let sum = Object.values(pop).reduce((a,b)=>a+b,0);
  return sum / totalSeats;
}

function formatTop(list, color){
  return list.map((x,i)=>{

    // 🥇🥈🥉 badges
    let badge = "";
    if(i === 0) badge = "🥇";
    else if(i === 1) badge = "🥈";
    else if(i === 2) badge = "🥉";

    // ▲ ▼ arrows
    let arrow = x.diff > 0 ? "▲" : x.diff < 0 ? "▼" : "•";

  let prefix = badge ? `${badge} ${i+1}.` : `${i+1}.`;

  return `${prefix} ${t(x.s)} <span style="color:${color}; font-weight:600">
  ${arrow} ${x.diff>=0?"+":""}${x.diff}
  </span>`;

  }).join("<br>");

}

function detectLanguage(){

  // 1. Check saved preference first

  let saved = localStorage.getItem("lang");

  if(saved) return saved;

  // 2. Detect browser language

  let browserLang = navigator.language || navigator.userLanguage;

  if(browserLang && browserLang.toLowerCase().startsWith("te")){

    return "te";

  }

  return "en";

}

  // ===== DATA CALCULATION (FIXED) =====

    if(diff < 0) lossMap[s] = diff;
  }
}

let losers = Object.entries(lossMap).map(([s,diff])=>({s,diff}));

gainers.sort((a,b)=>b.diff - a.diff);
losers.sort((a,b)=>a.diff - b.diff);

let topLosers = losers.slice(0,5);

  } else {

    layer.setStyle({
      fillColor:getColor(s),
      fillOpacity: isTop ? 0.9 : 0.7,
      color: dynamicBorder,
      weight: isExtreme ? 6 : isTop ? 4 : 3,
      opacity:1,
      dashArray: diff<0 ? "4 3" : null
    });

    // 🔴 ADD PULSE HERE
    if(isExtreme && layer._path){
      layer._path.classList.add("pulse");
    }
  }

  // ===== TOOLTIP =====

let tip = `<b>${t(s)}</b><br>
${u.seats}: ${val}<br>
${u.modelLabel}: ${
  lang==="te" ? getLabelTelugu(mode) : getLabel(mode)
}`;

if(mode==="uniform"){

else if(mode==="y2011"||mode==="y2026"){

  tip += `<br>${u.share}: ${(val/850*100).toFixed(2)}%`;

}

layer.bindTooltip(tip,{sticky:true});

});


  // ===== UTs (mini polygons) =====
  utLayer.clearLayers();

  for(let s in UT_BOX){

  // ===== PANELS =====
console.log("PANEL START");

// 🌐 Language class

if(lang === "te"){

// 🧭 Titles

 ${u.loss}: <span class="badge">${t(biggestLoss)}</span>`;

  // ===== STANDARD SHARE =====

let south = 0;
let sum = 0;

for(let s in data){

let share = (south/sum*100);

// ================== DRAG PANEL ==================
function initDragPanel(){

  const panel = document.getElementById("panel");

  if(!panel) return;

  let startY = 0;
  let currentY = 0;
  let isDragging = false;

  let collapsed = -window.innerHeight * 0.65;
  let mid = -window.innerHeight * 0.35;
  let expanded = 0;

  let currentTranslate = expanded;

setTranslate(mid);
currentTranslate = mid;

  function setTranslate(y){
    panel.style.transform = `translateY(${y}px)`;
  }

  function onStart(e){
    isDragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    panel.style.transition = "none";
  }

  function onMove(e){
    if(!isDragging) return;

    currentY = e.touches ? e.touches[0].clientY : e.clientY;

    let delta = currentY - startY;
    let next = currentTranslate + delta;

    if(next > 0) next = 0;
    if(next < collapsed) next = collapsed;

    setTranslate(next);
  }

  function onEnd(e){
    if(!isDragging) return;
    isDragging = false;

    panel.style.transition = "transform 0.25s ease";

    let delta = currentY - startY;
    let final = currentTranslate + delta;

    let snap;
    if(final > mid){
      snap = expanded;
    } else if(final > collapsed/2){
      snap = mid;
    } else {
      snap = collapsed;
    }

    currentTranslate = snap;
    setTranslate(snap);
  }

  panel.addEventListener("touchstart", onStart);
  panel.addEventListener("touchmove", onMove);
  panel.addEventListener("touchend", onEnd);

  panel.addEventListener("mousedown", onStart);
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onEnd);
}
